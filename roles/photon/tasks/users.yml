---
- name: Look up home directory for SSH-enabled users
  ansible.builtin.getent:
    database: passwd
    key: "{{ item.name }}"
  loop: "{{ ssh_enabled_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ensure .ssh directory exists for SSH-enabled users
  ansible.builtin.file:
    path: "{{ getent_passwd[item.name][4] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ ssh_enabled_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Apply any user SSH keys
  ansible.builtin.lineinfile:
    path: "{{ getent_passwd[item.name][4] }}/.ssh/authorized_keys"
    line: "{{ item.ssh_key }}"
    create: yes
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
  loop: "{{ ssh_enabled_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Set root user password to never expires
  shell: chage -M -1 root
  when: users_root_pwd_no_expire | bool